<!DOCTYPE html>

<html lang="ca">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cinemàtica inversa d'un robot de dos braços</title>

<script type="text/javascript" async
src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.0/es5/tex-mml-chtml.js">
</script>

<style>

body {

    font-family: Arial, sans-serif;
    margin: 20px;

}

.equation {

    margin: 20px 0;

}

.results {

    font-weight: bold;

}

#output, #robotCanvas {

    display: none;

}

canvas {

    border: 1px solid black;

}

</style>

</head>

<body>

<h1>Càlcul dels angles d'un robot amb dos braços</h1>

<div>

    <label for="a1">Longitud del primer braç (a₁):</label>
    <input type="number" id="a1" value="1" step="0.1"><br><br>

    <label for="a2">Longitud del segon braç (a₂):</label>
    <input type="number" id="a2" value="0.5" step="0.1"><br><br>

    <label for="x">Posició X:</label>
    <input type="number" id="x" value="1" step="0.1"><br><br>

    <label for="y">Posició Y:</label>
    <input type="number" id="y" value="0.8" step="0.1"><br><br>

    <button onclick="calculateAngles()">Calcula els angles</button>

</div>

<div id="output"></div>

<canvas id="robotCanvas" width="400" height="400"></canvas>

<script>

function calculateAngles() {

    let a1 = parseFloat(document.getElementById("a1").value);

    let a2 = parseFloat(document.getElementById("a2").value);

    let x = parseFloat(document.getElementById("x").value);

    let y = parseFloat(document.getElementById("y").value);


    document.getElementById("output").style.display = "block";

    document.getElementById("robotCanvas").style.display = "block";


    let output = "";

    // Fase 1: Mostrar fórmules

    output += "<div class='equation'>Les fórmules de cinemàtica inversa són:</div>";

    output += "<div class='equation'>\\[ q_2 = \\cos^{-1}\\left(\\frac{x^2+y^2-a_1^2-a_2^2}{2a_1a_2}\\right) \\]</div>";

    output += "<div class='equation'>\\[ q_1 = atan2(y,x)-atan2(a_2\\sin(q_2),a_1+a_2\\cos(q_2)) \\]</div>";


    // Fase 2: Substitució

    let numerador = x*x + y*y - a1*a1 - a2*a2;

    let denominador = 2*a1*a2;

    let cos_q2 = numerador / denominador;

    // Comprovació de validesa

    if(cos_q2 < -1 || cos_q2 > 1){

        document.getElementById("output").innerHTML =
        "<h2 style='color:red'>Aquest punt no és accessible pel robot.</h2>";

        return;
    }

    let q2 = Math.acos(cos_q2);

    let q1 = Math.atan2(y,x) -
             Math.atan2(
                 a2*Math.sin(q2),
                 a1+a2*Math.cos(q2)
             );

    let q1_deg = q1 * 180 / Math.PI;

    let q2_deg = q2 * 180 / Math.PI;


    output += "<div class='equation'>Substituïm els valors:</div>";

    output += `<div class='equation'>
    \\[
    q_2=
    \\cos^{-1}
    \\left(
    \\frac{
    ${x}^2+${y}^2-${a1}^2-${a2}^2
    }
    {
    2·${a1}·${a2}
    }
    \\right)
    \\]
    </div>`;


    // Fase 3: Desenvolupament numèric

    output += "<div class='equation'>Desglossant els càlculs:</div>";

    output += `<div class='equation'>
    Numerador = ${numerador.toFixed(4)}
    </div>`;

    output += `<div class='equation'>
    Denominador = ${denominador.toFixed(4)}
    </div>`;

    output += `<div class='equation'>
    \\[
    \\cos(q_2)=
    ${cos_q2.toFixed(4)}
    \\]
    </div>`;

    output += `<div class='equation'>
    \\[
    q_2=
    ${q2_deg.toFixed(2)}^\\circ
    \\]
    </div>`;


    let atanA = Math.atan2(y,x);

    let atanB = Math.atan2(
        a2*Math.sin(q2),
        a1+a2*Math.cos(q2)
    );

    output += `<div class='equation'>
    atan2(y,x)=
    ${(atanA*180/Math.PI).toFixed(2)}°
    </div>`;

    output += `<div class='equation'>
    segon atan2=
    ${(atanB*180/Math.PI).toFixed(2)}°
    </div>`;


    output += "<div class='equation'>Resultats finals:</div>";

    output += `<div class='equation'>
    \\[
    q_1=${q1_deg.toFixed(2)}^\\circ
    \\]
    </div>`;

    output += `<div class='equation'>
    \\[
    q_2=${q2_deg.toFixed(2)}^\\circ
    \\]
    </div>`;


    document.getElementById("output").innerHTML = output;

    MathJax.typeset();


    // ==================
    // PART GRÀFICA
    // ==================

    let canvas = document.getElementById("robotCanvas");

    let ctx = canvas.getContext("2d");

    ctx.clearRect(0,0,canvas.width,canvas.height);


    let centerX = canvas.width/2;

    let centerY = canvas.height/2;

    let scale = 80;


    let x1 = a1*Math.cos(q1);

    let y1 = a1*Math.sin(q1);


    let x1s = centerX + x1*scale;

    let y1s = centerY - y1*scale;

    let x2s = centerX + x*scale;

    let y2s = centerY - y*scale;


    // Braç 1

    ctx.beginPath();

    ctx.moveTo(centerX,centerY);

    ctx.lineTo(x1s,y1s);

    ctx.strokeStyle="blue";

    ctx.lineWidth=5;

    ctx.stroke();


    // Braç 2

    ctx.beginPath();

    ctx.moveTo(x1s,y1s);

    ctx.lineTo(x2s,y2s);

    ctx.strokeStyle="green";

    ctx.lineWidth=5;

    ctx.stroke();


    // Articulacions

    ctx.fillStyle="red";

    ctx.beginPath();
    ctx.arc(centerX,centerY,5,0,2*Math.PI);
    ctx.fill();

    ctx.beginPath();
    ctx.arc(x1s,y1s,5,0,2*Math.PI);
    ctx.fill();

    ctx.beginPath();
    ctx.arc(x2s,y2s,5,0,2*Math.PI);
    ctx.fill();

}

</script>

</body>

</html>
