<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Calculadora de Estadística Avanzada</title>

<!-- MathJax -->
<script>
window.MathJax = {
    tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
    },
    svg: { fontCache: 'global' }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

<style>
:root{
    --primary:#2c3e50;
    --secondary:#3498db;
    --accent:#e74c3c;
    --light:#f8f9fa;
    --muted:#7f8c8d;
    --success:#27ae60;
    --card-bg:#fff;
    --shadow:0 6px 18px rgba(0,0,0,0.08);
    --radius:12px;
    --mono:monospace;
}

*{box-sizing:border-box}
body{
    margin:0;
    font-family:Segoe UI;
    background:linear-gradient(135deg,#eef2f7,#d9e4f5);
    color:#222;
}

.app{max-width:1100px;margin:20px auto;padding:20px}

header{
    background:linear-gradient(90deg,var(--primary),#1f2d3a);
    color:#fff;
    padding:20px;
    border-radius:var(--radius);
    box-shadow:var(--shadow);
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
    margin-top:20px;
}
@media(max-width:900px){.grid{grid-template-columns:1fr}}

.card{
    background:var(--card-bg);
    padding:18px;
    border-radius:var(--radius);
    box-shadow:var(--shadow);
}

.section-title{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.section-title .dot{width:10px;height:25px;background:var(--secondary);border-radius:4px}

input,button{
    padding:8px;
    border-radius:8px;
    border:1px solid #ddd;
}

button{
    cursor:pointer;
    background:var(--secondary);
    color:#fff;
    font-weight:700;
}
button:hover{opacity:0.9}

.table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}
.table th,.table td{
    border:1px solid #ddd;
    padding:6px;
    text-align:center;
}

.step{
    margin-top:10px;
    padding:10px;
    border-radius:10px;
    background:#f7f9fc;
    border:1px solid #e5ecf3;
}

.toggle{
    background:var(--primary);
    margin-top:8px;
}

.hidden{display:none}

.result{
    margin-top:10px;
    padding:10px;
    background:var(--light);
    border-left:4px solid var(--secondary);
    border-radius:8px;
}

.value{font-weight:700;color:var(--accent)}
</style>
</head>

<body>
<div class="app">
<header>
    <h1>Calculadora Estadística Avanzada</h1>
    <p>Media, mediana, moda, rango, varianza, desviación típica y frecuencias</p>
</header>

<div class="grid">

<!-- INPUT -->
<div class="card">
    <div class="section-title"><div class="dot"></div><h3>Tabla de datos</h3></div>

    <button onclick="addRow()">Añadir fila</button>
    <button onclick="calculate()">Calcular</button>

    <table class="table" id="t">
        <thead>
            <tr>
                <th>xi</th>
                <th>fi</th>
                <th>hi</th>
                <th>Fi</th>
                <th>Hi</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<!-- OUTPUT -->
<div class="card">
    <div class="section-title"><div class="dot"></div><h3>Resultados</h3></div>
    <div id="out"></div>
    <button class="toggle" onclick="toggleSteps()">Mostrar/Ocultar procesos</button>
</div>

</div>
</div>

<script>
function addRow(){
    let tr=document.createElement("tr");
    tr.innerHTML=`
    <td><input class="xi" type="number"></td>
    <td><input class="fi" type="number"></td>
    <td class="hi"></td>
    <td class="Fi"></td>
    <td class="Hi"></td>`;
    document.querySelector("tbody").appendChild(tr);
}

function calculate(){
    let xi=[...document.querySelectorAll(".xi")].map(e=>+e.value);
    let fi=[...document.querySelectorAll(".fi")].map(e=>+e.value);

    let N=fi.reduce((a,b)=>a+b,0);

    let Fi=0,Hi=0;
    let data=[];

    for(let i=0;i<xi.length;i++){
        let hi=fi[i]/N;
        Fi+=fi[i];
        Hi+=hi;

        document.getElementsByClassName("hi")[i].innerText=hi.toFixed(3);
        document.getElementsByClassName("Fi")[i].innerText=Fi;
        document.getElementsByClassName("Hi")[i].innerText=Hi.toFixed(3);

        for(let j=0;j<fi[i];j++) data.push(xi[i]);
    }

    let mean=data.reduce((a,b)=>a+b,0)/N;
    let sorted=[...data].sort((a,b)=>a-b);
    let med=sorted.length%2?sorted[Math.floor(N/2)]: (sorted[N/2-1]+sorted[N/2])/2;

    let moda=xi[fi.indexOf(Math.max(...fi))];
    let rango=Math.max(...data)-Math.min(...data);

    let varianza=data.reduce((a,b)=>a+Math.pow(b-mean,2),0)/N;
    let desv=Math.sqrt(varianza);

    document.getElementById("out").innerHTML=`
    <div class="step">
        Media = <span class="value">${mean.toFixed(3)}</span><br>
        Mediana = <span class="value">${med}</span><br>
        Moda = <span class="value">${moda}</span><br>
        Rango = <span class="value">${rango}</span><br>
        Varianza = <span class="value">${varianza.toFixed(3)}</span><br>
        Desviación típica = <span class="value">${desv.toFixed(3)}</span>
    </div>

    <div id="steps" class="hidden step">
        <h4>Proceso</h4>
        N = ${N}<br>
        Media = Σ(xi·fi)/N = ${mean.toFixed(3)}
    </div>`;

    MathJax.typeset();
}

function toggleSteps(){
    document.getElementById("steps").classList.toggle("hidden");
}
</script>
</body>
</html>
