<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Calculadora Estadística Avançada</title>

<script>
window.MathJax = {
    tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
    },
    svg: { fontCache: 'global' }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

<style>
:root{
    --primary:#2c3e50;
    --secondary:#3498db;
    --accent:#e74c3c;
    --light:#f8f9fa;
    --shadow:0 6px 18px rgba(0,0,0,0.08);
    --radius:12px;
}

*{box-sizing:border-box}
body{
    margin:0;
    font-family:Segoe UI;
    background:linear-gradient(135deg,#eef2f7,#d9e4f5);
}

.app{max-width:1100px;margin:20px auto;padding:20px}

header{
    background:linear-gradient(90deg,var(--primary),#1f2d3a);
    color:#fff;
    padding:20px;
    border-radius:var(--radius);
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
    margin-top:20px;
}
@media(max-width:900px){.grid{grid-template-columns:1fr}}

.card{
    background:#fff;
    padding:18px;
    border-radius:var(--radius);
    box-shadow:var(--shadow);
}

.section-title{display:flex;gap:10px;align-items:center}
.section-title .dot{width:10px;height:25px;background:var(--secondary);border-radius:4px}

button{
    padding:8px;
    border-radius:8px;
    border:0;
    background:var(--secondary);
    color:#fff;
    font-weight:700;
    cursor:pointer;
    margin:4px 0;
}

table{width:100%;border-collapse:collapse;margin-top:10px}
td,th{border:1px solid #ddd;padding:6px;text-align:center}

.result{
    margin-top:10px;
    padding:10px;
    background:var(--light);
    border-left:4px solid var(--secondary);
}

.value{color:var(--accent);font-weight:700}

.hidden{display:none}
.step{background:#f7f9fc;padding:10px;margin-top:10px;border-radius:10px}
</style>
</head>

<body>

<div class="app">
<header>
<h1>Calculadora Estadística Avançada</h1>
<p>Tot el procés detallat: mitjana, mediana, moda, variància i desviació típica</p>
</header>

<div class="grid">

<!-- INPUT -->
<div class="card">
    <div class="section-title"><div class="dot"></div><h3>Dades</h3></div>

    <button onclick="addRow()">Afegir fila</button>
    <button onclick="calculate()">Calcular</button>

    <table>
        <thead>
            <tr>
                <th>xi</th>
                <th>fi</th>
                <th>hi</th>
                <th>Fi</th>
                <th>Hi</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<!-- OUTPUT -->
<div class="card">
    <div class="section-title"><div class="dot"></div><h3>Resultats</h3></div>
    <div id="out"></div>
</div>

</div>
</div>

<script>

function addRow(){
    let tr=document.createElement("tr");
    tr.innerHTML=`
    <td><input class="xi" type="number"></td>
    <td><input class="fi" type="number"></td>
    <td class="hi"></td>
    <td class="Fi"></td>
    <td class="Hi"></td>`;
    document.querySelector("tbody").appendChild(tr);
}

function calculate(){

  document.getElementById("out").innerHTML=`

<div class="result">
    <h3>📊 Resultats finals</h3>
    Mitjana = <span class="value">${mean.toFixed(6)}</span><br>
    Mediana = <span class="value">${med}</span><br>
    Moda = <span class="value">${moda}</span><br>
    Rang = <span class="value">${rango}</span><br>
    Variància = <span class="value">${varianza.toFixed(6)}</span><br>
    Desviació típica = <span class="value">${desv.toFixed(6)}</span>
</div>

<div class="step">
<h3>🧮 Desenvolupament COMPLET de Σ(xi·fi)</h3>
$$
\\sum x_i f_i = 
${xi.map((v,i)=>`${v}\\cdot${fi[i]}`).join(" + ")}
$$

$$
\\sum x_i f_i = ${sum_xifi.toFixed(6)}
$$
</div>

<div class="step">
<h3>🧮 Desenvolupament fila per fila</h3>
${xi.map((v,i)=>`
$$ x_{${i+1}} f_{${i+1}} = ${v}\\cdot${fi[i]} = ${(v*fi[i]).toFixed(4)} $$`
).join("")}
</div>

<div class="step">
<h3>📐 Desenvolupament de Σ(xi²·fi)</h3>

$$
\\sum x_i^2 f_i =
${xi.map((v,i)=>`(${v}^2)\\cdot${fi[i]}`).join(" + ")}
$$

$$
\\sum x_i^2 f_i = ${sum_xi2fi.toFixed(6)}
$$
</div>

<div class="step">
<h3>📐 Detall complet de xi²·fi</h3>

${xi.map((v,i)=>`
$$ ${v}^2 = ${v*v} \\quad \\Rightarrow \\quad ${v*v}\\cdot${fi[i]} = ${(v*v*fi[i]).toFixed(4)} $$`
).join("")}
</div>

<div class="step">
<h3>📊 Fórmula de la mitjana</h3>

$$
\\bar{x} = \\frac{\\sum x_i f_i}{N}
$$

$$
\\bar{x} = \\frac{${sum_xifi.toFixed(6)}}{${N}} = ${mean.toFixed(6)}
$$
</div>

<div class="step">
<h3>📉 Variància (3 formes diferents)</h3>

$$
\\sigma^2 = \\frac{\\sum x_i^2 f_i}{N} - \\bar{x}^2
$$

Substitució:

$$
\\sigma^2 = \\frac{${sum_xi2fi.toFixed(6)}}{${N}} - (${mean.toFixed(6)})^2
$$

$$
\\sigma^2 = ${(sum_xi2fi/N).toFixed(6)} - ${(mean*mean).toFixed(6)}
$$

$$
\\sigma^2 = ${varianza.toFixed(6)}
$$
</div>

<div class="step">
<h3>📉 Forma alternativa (comprovació)</h3>

$$
\\sigma^2 = \\frac{\\sum f_i (x_i - \\bar{x})^2}{N}
$$

${xi.map((v,i)=>`
$$ (${v} - ${mean.toFixed(4)})^2 \\cdot ${fi[i]} $$`
).join("")}

$$
\\sigma^2 = ${varianza.toFixed(6)}
$$
</div>

<div class="step">
<h3>📏 Desviació típica</h3>

$$
\\sigma = \\sqrt{\\sigma^2}
$$

$$
\\sigma = \\sqrt{${varianza.toFixed(6)}} = ${desv.toFixed(6)}
$$
</div>

<div class="step">
<h3>📌 Mediana (procés complet)</h3>

$$
N = ${N}
$$

$$
Posició = \\frac{N}{2} = ${N/2}
$$

Dades ordenades:

$$
${sorted.join(", ")}
$$

Mediana = ${med}
</div>

<div class="step">
<h3>📊 Freqüències relatives</h3>

${xi.map((v,i)=>`
$$ h_${i+1} = \\frac{${fi[i]}}{${N}} = ${(fi[i]/N).toFixed(6)} $$`
).join("")}
</div>

<div class="step">
<h3>📈 Interpretació estadística</h3>

$$
\\text{La mitjana representa el centre de les dades}
$$

$$
\\text{La variància mesura la dispersió respecte la mitjana}
$$

$$
\\text{La desviació típica és la dispersió en unitats originals}
$$
</div>

<div class="step">
<h3>🧠 Comprovació final</h3>

$$
\\bar{x}^2 = ${(mean*mean).toFixed(6)}
$$

$$
\\frac{\\sum x_i^2 f_i}{N} = ${(sum_xi2fi/N).toFixed(6)}
$$

$$
\\text{Diferència} = ${varianza.toFixed(6)}
$$
</div>

`;

MathJax.typeset();
