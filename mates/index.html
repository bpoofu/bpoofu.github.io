<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Calculadora Estadística Avançada</title>

<script>
window.MathJax = {
    tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
    },
    svg: { fontCache: 'global' }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

<style>
:root{
    --primary:#2c3e50;
    --secondary:#3498db;
    --accent:#e74c3c;
    --light:#f8f9fa;
    --shadow:0 6px 18px rgba(0,0,0,0.08);
    --radius:12px;
}

*{box-sizing:border-box}
body{
    margin:0;
    font-family:Segoe UI;
    background:linear-gradient(135deg,#eef2f7,#d9e4f5);
}

.app{max-width:1100px;margin:20px auto;padding:20px}

header{
    background:linear-gradient(90deg,var(--primary),#1f2d3a);
    color:#fff;
    padding:20px;
    border-radius:var(--radius);
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
    margin-top:20px;
}
@media(max-width:900px){.grid{grid-template-columns:1fr}}

.card{
    background:#fff;
    padding:18px;
    border-radius:var(--radius);
    box-shadow:var(--shadow);
}

.section-title{display:flex;gap:10px;align-items:center}
.section-title .dot{width:10px;height:25px;background:var(--secondary);border-radius:4px}

button{
    padding:8px;
    border-radius:8px;
    border:0;
    background:var(--secondary);
    color:#fff;
    font-weight:700;
    cursor:pointer;
    margin:4px 0;
}

table{width:100%;border-collapse:collapse;margin-top:10px}
td,th{border:1px solid #ddd;padding:6px;text-align:center}

.result{
    margin-top:10px;
    padding:10px;
    background:var(--light);
    border-left:4px solid var(--secondary);
}

.value{color:var(--accent);font-weight:700}

.hidden{display:none}
.step{background:#f7f9fc;padding:10px;margin-top:10px;border-radius:10px}
</style>
</head>

<body>

<div class="app">
<header>
<h1>Calculadora Estadística Avançada</h1>
<p>Tot el procés detallat: mitjana, mediana, moda, variància i desviació típica</p>
</header>

<div class="grid">

<!-- INPUT -->
<div class="card">
    <div class="section-title"><div class="dot"></div><h3>Dades</h3></div>

    <button onclick="addRow()">Afegir fila</button>
    <button onclick="calculate()">Calcular</button>

    <table>
        <thead>
            <tr>
                <th>xi</th>
                <th>fi</th>
                <th>hi</th>
                <th>Fi</th>
                <th>Hi</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<!-- OUTPUT -->
<div class="card">
    <div class="section-title"><div class="dot"></div><h3>Resultats</h3></div>
    <div id="out"></div>
</div>

</div>
</div>

<script>

function addRow(){
    let tr=document.createElement("tr");
    tr.innerHTML=`
    <td><input class="xi" type="number"></td>
    <td><input class="fi" type="number"></td>
    <td class="hi"></td>
    <td class="Fi"></td>
    <td class="Hi"></td>`;
    document.querySelector("tbody").appendChild(tr);
}

function calculate(){

    let xi=[...document.querySelectorAll(".xi")].map(e=>+e.value);
    let fi=[...document.querySelectorAll(".fi")].map(e=>+e.value);

    let N = fi.reduce((a,b)=>a+b,0);

    let Fi=0, Hi=0;
    let data=[];
    let sum_xifi=0;
    let sum_xi2fi=0;

    let freqTable="";

    for(let i=0;i<xi.length;i++){

        let hi = fi[i]/N;
        Fi += fi[i];
        Hi += hi;

        sum_xifi += xi[i]*fi[i];
        sum_xi2fi += Math.pow(xi[i],2)*fi[i];

        document.getElementsByClassName("hi")[i].innerText=hi.toFixed(3);
        document.getElementsByClassName("Fi")[i].innerText=Fi;
        document.getElementsByClassName("Hi")[i].innerText=Hi.toFixed(3);

        for(let j=0;j<fi[i];j++) data.push(xi[i]);
    }

    let mean = sum_xifi / N;

    let sorted=[...data].sort((a,b)=>a-b);

    let med = (sorted.length%2)
        ? sorted[Math.floor(N/2)]
        : (sorted[N/2-1]+sorted[N/2])/2;

    let moda = xi[fi.indexOf(Math.max(...fi))];

    let rango = Math.max(...data)-Math.min(...data);

    let varianza = sum_xi2fi/N - Math.pow(mean,2);
    let desv = Math.sqrt(varianza);

    // TAULA EXPLICATIVA
    for(let i=0;i<xi.length;i++){
        freqTable += `
        <tr>
            <td>${xi[i]}</td>
            <td>${fi[i]}</td>
            <td>${(xi[i]*fi[i]).toFixed(2)}</td>
            <td>${(Math.pow(xi[i],2)*fi[i]).toFixed(2)}</td>
        </tr>`;
    }

    document.getElementById("out").innerHTML=`

    <div class="result">
        <h3>📊 Resultats finals</h3>
        Mitjana = <span class="value">${mean.toFixed(4)}</span><br>
        Mediana = <span class="value">${med}</span><br>
        Moda = <span class="value">${moda}</span><br>
        Rang = <span class="value">${rango}</span><br>
        Variància = <span class="value">${varianza.toFixed(4)}</span><br>
        Desviació típica = <span class="value">${desv.toFixed(4)}</span>
    </div>

    <div class="step">
        <h3>📌 Taula de càlculs</h3>
        <table>
            <tr>
                <th>xi</th>
                <th>fi</th>
                <th>xi·fi</th>
                <th>xi²·fi</th>
            </tr>
            ${freqTable}
        </table>
    </div>

    <div class="step">
        <h3>🧮 Desenvolupament de la mitjana</h3>
        Σfi = ${N}<br>
        Σ(xi·fi) = ${sum_xifi.toFixed(4)}<br>
        $$ \\bar{x} = \\frac{\\sum x_i f_i}{N} = ${mean.toFixed(4)} $$
    </div>

    <div class="step">
        <h3>📉 Desenvolupament de la variància</h3>
        Σ(xi²·fi) = ${sum_xi2fi.toFixed(4)}<br>
        $$ \\sigma^2 = \\frac{\\sum x_i^2 f_i}{N} - \\bar{x}^2 $$<br>
        $$ \\sigma^2 = ${varianza.toFixed(4)} $$
    </div>

    <div class="step">
        <h3>📌 Dades ordenades</h3>
        ${sorted.join(", ")}
    </div>

    <div class="step">
        <h3>📍 Mediana explicada</h3>
        Nombre de dades = ${N}<br>
        Posició mediana = ${Math.floor(N/2)}
    </div>

    `;

    MathJax.typeset();
}

</script>

</body>
</html>
